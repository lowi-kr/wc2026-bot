name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main          # Auto-deploys every time you save a change to GitHub
  workflow_dispatch:  # Also lets you deploy manually from the GitHub website

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Inject D1 database ID into wrangler.toml
        # Replaces the $D1_DATABASE_ID placeholder with the real ID stored in GitHub Secrets
        run: sed -i "s|\$D1_DATABASE_ID|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
