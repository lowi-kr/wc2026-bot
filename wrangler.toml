name = "wc2026-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "* * * * *",   # Every minute — smart live polling (exits instantly if no active games)
  "0 8 * * *"    # 8AM UTC daily — post tomorrow's knockout schedule
]

[[d1_databases]]
binding = "DB"
database_name = "wc2026"
database_id = "$D1_DATABASE_ID"   # Injected by Cloudflare build variable — do not edit

# No API key needed — this bot uses ESPN's free unofficial API
# Only secret needed at runtime:
#   GROUPME_BOT_ID — set in Cloudflare Dashboard → Workers → wc2026-bot → Settings → Variables

[observability.logs]
enabled = true
invocation_logs = true