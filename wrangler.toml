name = "wc2026-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "* * * * *",   # Every minute — smart live polling (exits instantly if no active games)
  "0 8 * * *"    # 8AM UTC daily — post tomorrow's knockout schedule
]

[[d1_databases]]
binding = "DB"
database_name = "wc2026"
database_id = "$D1_DATABASE_ID"   # Injected automatically by GitHub Actions — do not edit

[vars]
WC_LEAGUE_ID = "1"
WC_SEASON    = "2026"

# All secrets are stored in Cloudflare (never in this file):
#   API_FOOTBALL_KEY   — set in Cloudflare Dashboard → Workers → wc2026-bot → Settings → Variables
#   GROUPME_BOT_ID     — same place
